name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, Typecheck, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      KASI_SERVICE_KEY: ${{ secrets.KASI_SERVICE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Validate KASI calendar samples
        if: ${{ env.KASI_SERVICE_KEY != '' }}
        run: npm run validate:kasi

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
